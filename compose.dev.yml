services:
    postgres:
        image: postgres:16-alpine
        container_name: template-postgres
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: template
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d template']
            interval: 10s
            timeout: 5s
            retries: 5

    api:
        image: node:24-slim
        container_name: template-api-dev
        working_dir: /usr/src/app
        command: sh -c "npm ci && npm run dev"
        ports:
            - '3000:3000'
        environment:
            PORT: 3000
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/template
        volumes:
            - ./:/usr/src/app
            - api_node_modules:/usr/src/app/node_modules
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres_data:
    api_node_modules:
