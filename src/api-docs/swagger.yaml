openapi: 3.0.0
info:
    title: Express API Boilerplate
    version: 1.0.0
    description: A simple Express API with TypeScript
servers:
    - url: /
paths:
    /health:
        get:
            tags:
                - Health
            summary: Health check
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
    /api/v1/users:
        get:
            tags:
                - Users
            summary: List all users
            responses:
                '200':
                    description: A list of users
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/User'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
        post:
            tags:
                - Users
            summary: Create a new user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UserInput'
            responses:
                '201':
                    description: User created
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/User'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '409':
                    description: Email already exists
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Internal server error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/users/{id}:
        get:
            tags:
                - Users
            summary: Get user by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: User ID (Mongo ObjectId)
            responses:
                '200':
                    description: User found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/User'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        put:
            tags:
                - Users
            summary: Update user by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: User ID (Mongo ObjectId)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UserInput'
            responses:
                '200':
                    description: User updated
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        $ref: '#/components/schemas/User'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        delete:
            tags:
                - Users
            summary: Delete user by ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: User ID (Mongo ObjectId)
            responses:
                '200':
                    description: User deleted
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: 'null'
                                    message:
                                        type: string
                                    success:
                                        type: boolean
                '404':
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'

components:
    schemas:
        User:
            type: object
            required:
                - _id
                - name
                - email
            properties:
                _id:
                    type: string
                    description: MongoDB ObjectId
                name:
                    type: string
                email:
                    type: string
                password:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        UserInput:
            type: object
            required:
                - name
                - email
                - password
            properties:
                name:
                    type: string
                email:
                    type: string
                password:
                    type: string
        Error:
            type: object
            properties:
                error:
                    type: string
                message:
                    type: string
